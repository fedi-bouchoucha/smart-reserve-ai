# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_office_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=smart_user
spring.datasource.password=trytoguessit12345

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnough2024OfficeSmart
app.jwt.expiration-ms=86400000

# Server
server.port=8080

# Email (SMTP Example for Mailtrap/Gmail)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=your_mailtrap_user
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
