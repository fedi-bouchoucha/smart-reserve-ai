# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart_office_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smart_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:trytoguessit12345}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=20000


# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnough2024OfficeSmart
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Server
server.port=8080

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=fadibouch123@gmail.com
# REMPLACEZ 'your_gmail_app_password' par le code de 16 caractères généré dans Google
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Redis
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}

# LLM Integration (OpenAI API Compatible)
app.llm.api-url=https://api.openai.com/v1/chat/completions
app.llm.api-key=${OPENAI_API_KEY:YOUR_API_KEY_HERE}
app.llm.model=gpt-3.5-turbo